<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>G&A KCash — Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1f7c26',
                        'primary-light': '#28a745',
                        accent: '#F9A825'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #F8F9FA; }
        .btn-gold {
            background: linear-gradient(135deg, #F9A825 0%, #F57F17 100%);
            color: #1f7c26;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .btn-gold:hover {
            background: linear-gradient(135deg, #F57F17 0%, #E65100 100%);
            color: #fff;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
    <div id="app" class="min-h-screen flex items-center justify-center">
        <!-- Login Screen -->
        <div id="loginScreen" class="bg-white rounded-3xl shadow-xl p-8 sm:p-12 max-w-md w-full mx-4">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-extrabold text-primary">G&A <span class="text-accent">KCash</span></h1>
                <p class="text-gray-500 text-sm mt-1">Admin Dashboard</p>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Admin Password</label>
                <input type="password" id="passwordInput"
                       class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-primary focus:outline-none"
                       placeholder="Enter admin password" />
            </div>
            <div id="loginError" class="text-red-600 text-sm mb-3 hidden"></div>
            <button onclick="login()" class="btn-gold w-full px-6 py-3 rounded-xl font-bold text-lg">Login</button>
        </div>

        <!-- Dashboard Screen -->
        <div id="dashboardScreen" class="hidden w-full max-w-6xl mx-4 py-8">
            <div class="bg-white rounded-3xl shadow-xl p-6 sm:p-8">
                <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-6 gap-4">
                    <div>
                        <h1 class="text-2xl font-extrabold text-primary">G&A <span class="text-accent">KCash</span> <span class="text-gray-700 text-lg font-normal">Admin</span></h1>
                        <p class="text-sm text-gray-500" id="statsText">Loading...</p>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="downloadCsv()" class="bg-primary text-white px-5 py-2 rounded-xl font-semibold text-sm hover:bg-primary-light transition flex items-center gap-2">
                            <i class="fas fa-download"></i> Download CSV
                        </button>
                        <button onclick="logout()" class="border-2 border-red-200 text-red-600 px-5 py-2 rounded-xl font-semibold text-sm hover:bg-red-50 transition">
                            Logout
                        </button>
                    </div>
                </div>

                <!-- Tabs -->
                <div class="flex gap-6 border-b border-gray-200 mb-6">
                    <button id="tab-pending" onclick="switchTab('PENDING')" class="pb-3 border-b-2 border-primary text-primary font-bold text-sm transition-all">Pending Applications</button>
                    <button id="tab-done" onclick="switchTab('DONE')" class="pb-3 border-b-2 border-transparent text-gray-400 hover:text-gray-600 font-medium text-sm transition-all">Done / Completed</button>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left" id="submissionsTable">
                        <thead>
                            <tr class="border-b-2 border-gray-100 text-gray-500 uppercase text-xs tracking-wider">
                                <th class="py-3 pr-4">ID</th>
                                <th class="py-3 pr-4">Date</th>
                                <th class="py-3 pr-4">Name</th>
                                <th class="py-3 pr-4">Contact</th>
                                <th class="py-3 pr-4">Email</th>
                                <th class="py-3 pr-4">Amount</th>
                                <th class="py-3 pr-4">Purpose</th>
                                <th class="py-3 pr-4">Branch</th>
                                <th class="py-3 pr-4">Status</th>
                                <th class="py-3 pr-4">Action</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr><td colspan="10" class="text-center py-8 text-gray-400">No submissions yet.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://ganda-kcash-microfinance.up.railway.app';
        let authToken = '';
        let allSubmissions = [];
        let currentTab = 'PENDING';

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', function() {
            const savedToken = localStorage.getItem('adminAuthToken');
            if (savedToken) {
                authToken = savedToken;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('dashboardScreen').classList.remove('hidden');
                loadData();
            }
        });

        async function login() {
            const pw = document.getElementById('passwordInput').value;
            const err = document.getElementById('loginError');
            try {
                const res = await fetch(API + '/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pw }),
                });
                const data = await res.json();
                if (!data.success) {
                    err.textContent = data.error || 'Login failed';
                    err.classList.remove('hidden');
                    return;
                }
                authToken = data.token;
                localStorage.setItem('adminAuthToken', authToken);
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('dashboardScreen').classList.remove('hidden');
                loadData();
            } catch (e) {
                err.textContent = 'Connection error. Is the server running?';
                err.classList.remove('hidden');
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-pending').className = tab === 'PENDING' 
                ? 'pb-3 border-b-2 border-primary text-primary font-bold text-sm transition-all' 
                : 'pb-3 border-b-2 border-transparent text-gray-400 hover:text-gray-600 font-medium text-sm transition-all';
            document.getElementById('tab-done').className = tab === 'DONE' 
                ? 'pb-3 border-b-2 border-primary text-primary font-bold text-sm transition-all' 
                : 'pb-3 border-b-2 border-transparent text-gray-400 hover:text-gray-600 font-medium text-sm transition-all';
            renderTable();
        }

        async function loadData() {
            try {
                const res = await fetch(API + '/api/admin/stats', {
                    headers: { 'Authorization': 'Bearer ' + authToken },
                });
                const stats = await res.json();
                document.getElementById('statsText').textContent =
                    'Total submissions: ' + (stats.totalSubmissions || 0) + ' | Last updated: ' + new Date().toLocaleString();
            } catch (e) {}

            try {
                const res = await fetch(API + '/api/admin/submissions', {
                    headers: { 'Authorization': 'Bearer ' + authToken },
                });
                const csvText = await res.text();
                const rows = csvText.trim().split('\n');
                
                allSubmissions = [];
                if (rows.length > 1) {
                    for (let i = rows.length - 1; i >= 1; i--) {
                        const cols = parseCsvRow(rows[i]);
                        if (cols.length >= 9) allSubmissions.push(cols);
                    }
                }
                renderTable();
            } catch (e) {
                console.error('Load error:', e);
            }
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const filtered = allSubmissions.filter(cols => cols[9] === currentTab);

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" class="text-center py-8 text-gray-400">No submissions in this tab.</td></tr>';
                return;
            }

            let html = '';
            for (const cols of filtered) {
                const statusClass = cols[9] === 'PENDING' ? 'bg-yellow-100 text-yellow-800' : 'bg-green-100 text-green-800';
                
                html += '<tr class="border-b border-gray-50 hover:bg-gray-50">';
                html += '<td class="py-3 pr-4 font-mono text-xs">' + esc(cols[0]) + '</td>';
                html += '<td class="py-3 pr-4 text-xs">' + esc(new Date(cols[1]).toLocaleString()) + '</td>';
                html += '<td class="py-3 pr-4 font-medium">' + esc(cols[2]) + '</td>';
                html += '<td class="py-3 pr-4">' + esc(cols[3]) + '</td>';
                html += '<td class="py-3 pr-4 text-xs">' + esc(cols[4]) + '</td>';
                html += '<td class="py-3 pr-4 font-medium">₱' + esc(cols[5]) + '</td>';
                html += '<td class="py-3 pr-4 capitalize">' + esc(cols[7]) + '</td>';
                html += '<td class="py-3 pr-4 text-xs">' + esc(cols[8]) + '</td>';
                html += '<td class="py-3 pr-4"><span class="px-2 py-1 rounded-full text-xs font-semibold ' + statusClass + '">' + esc(cols[9]) + '</span></td>';
                
                // Action Button Logic
                if (cols[9] === 'PENDING') {
                    html += '<td class="py-3 pr-4"><button onclick="markAsDone(\'' + cols[0] + '\')" class="bg-primary hover:bg-primary-light text-white px-3 py-1 rounded text-xs font-bold transition">Mark Done</button></td>';
                } else {
                    html += '<td class="py-3 pr-4 text-gray-400 text-xs italic">Completed</td>';
                }

                html += '</tr>';
            }
            tbody.innerHTML = html;
        }

        async function markAsDone(id) {
            if (!confirm('Move this application to the Done tab?')) return;
            
            try {
                const res = await fetch(API + '/api/admin/update-status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
                    body: JSON.stringify({ id: id, status: 'DONE' })
                });
                const data = await res.json();
                if (data.success) {
                    loadData(); // Re-fetch the data to update the table immediately
                } else {
                    alert('Error updating status. Make sure your server.js is updated!');
                }
            } catch (e) {
                alert('Connection error. Is the backend running?');
            }
        }

        function parseCsvRow(row) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < row.length; i++) {
                const ch = row[i];
                if (ch === '"') { inQuotes = !inQuotes; continue; }
                if (ch === ',' && !inQuotes) { result.push(current.trim()); current = ''; continue; }
                current += ch;
            }
            result.push(current.trim());
            return result;
        }

        function esc(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        async function downloadCsv() {
            const res = await fetch(API + '/api/admin/submissions', {
                headers: { 'Authorization': 'Bearer ' + authToken },
            });
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'loan-applications.csv';
            a.click();
            URL.revokeObjectURL(url);
        }

        function logout() {
            authToken = '';
            localStorage.removeItem('adminAuthToken');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('dashboardScreen').classList.add('hidden');
            document.getElementById('passwordInput').value = '';
        }

        // Enter key to login
        document.getElementById('passwordInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
