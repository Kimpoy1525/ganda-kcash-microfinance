<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>G&A KCash — Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        body { font-family: 'Inter', sans-serif; background: #F8F9FA; }
        .btn-gold {
            background: linear-gradient(135deg, #F9A825 0%, #F57F17 100%);
            color: #1f7c26;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .btn-gold:hover {
            background: linear-gradient(135deg, #F57F17 0%, #E65100 100%);
            color: #fff;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
    <div id="app" class="min-h-screen flex items-center justify-center">
        <!-- Login Screen -->
        <div id="loginScreen" class="bg-white rounded-3xl shadow-xl p-8 sm:p-12 max-w-md w-full mx-4">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-extrabold text-primary">G&A <span class="text-accent">KCash</span></h1>
                <p class="text-gray-500 text-sm mt-1">Admin Dashboard</p>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Admin Password</label>
                <div class="relative">
                    <input type="password" id="passwordInput"
                           class="w-full px-4 py-3 pr-12 border-2 border-gray-200 rounded-xl focus:border-primary focus:outline-none"
                           placeholder="Enter admin password" />
                    <button type="button" onclick="togglePassword()" 
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700 focus:outline-none">
                        <i id="passwordIcon" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <div id="loginError" class="text-red-600 text-sm mb-3 hidden"></div>
            <button onclick="login()" class="btn-gold w-full px-6 py-3 rounded-xl font-bold text-lg">Login</button>
        </div>

        <!-- Dashboard Screen -->
        <div id="dashboardScreen" class="hidden w-full max-w-6xl mx-4 py-8">
            <div class="bg-white rounded-3xl shadow-xl p-6 sm:p-8">
                <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-6 gap-4">
                    <div>
                        <h1 class="text-2xl font-extrabold text-primary">G&A <span class="text-accent">KCash</span> <span class="text-gray-700 text-lg font-normal">Admin</span></h1>
                        <p class="text-sm text-gray-500" id="statsText">Loading...</p>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="downloadCsv()" class="bg-primary text-white px-5 py-2 rounded-xl font-semibold text-sm hover:bg-primary-light transition flex items-center gap-2">
                            <i class="fas fa-download"></i> Download CSV
                        </button>
                        <button onclick="logout()" class="border-2 border-red-200 text-red-600 px-5 py-2 rounded-xl font-semibold text-sm hover:bg-red-50 transition">
                            Logout
                        </button>
                    </div>
                </div>
                <!-- Filter Section -->
                <div class="mb-6 p-4 bg-gray-50 rounded-xl">
                    <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4">
                        <div class="flex items-center gap-2">
                            <i class="fas fa-filter text-gray-600"></i>
                            <label class="text-sm font-semibold text-gray-700">Filter by Branch:</label>
                        </div>
                        <select id="branchFilter" onchange="filterByBranch()" 
                                class="px-4 py-2 border-2 border-gray-200 rounded-xl focus:border-primary focus:outline-none text-sm">
                            <option value="all">All Branches</option>
                        </select>
                        <button onclick="resetFilter()" 
                                class="px-4 py-2 bg-gray-200 text-gray-700 rounded-xl font-semibold text-sm hover:bg-gray-300 transition">
                            <i class="fas fa-undo"></i> Reset Filter
                        </button>
                        <span id="filterStatus" class="text-sm text-gray-600 ml-auto"></span>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left" id="submissionsTable">
                        <thead>
                            <tr class="border-b-2 border-gray-100 text-gray-500 uppercase text-xs tracking-wider">
                                <th class="py-3 pr-4">ID</th>
                                <th class="py-3 pr-4">Date</th>
                                <th class="py-3 pr-4">Name</th>
                                <th class="py-3 pr-4">Contact</th>
                                <th class="py-3 pr-4">Email</th>
                                <th class="py-3 pr-4">Amount</th>
                                <th class="py-3 pr-4">Purpose</th>
                                <th class="py-3 pr-4">Branch</th>
                                <th class="py-3 pr-4">Status</th>
                                <th class="py-3 pr-4">Action</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr><td colspan="10" class="text-center py-8 text-gray-400">No submissions yet.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://ganda-kcash-microfinance.up.railway.app';
        let authToken = '';

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', function() {
            const savedToken = localStorage.getItem('adminAuthToken');
            if (savedToken) {
                authToken = savedToken;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('dashboardScreen').classList.remove('hidden');
                loadData();
            }
        });

        async function login() {
            const pw = document.getElementById('passwordInput').value;
            const err = document.getElementById('loginError');
            try {
                const res = await fetch(API + '/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pw }),
                });
                const data = await res.json();
                if (!data.success) {
                    err.textContent = data.error || 'Login failed';
                    err.classList.remove('hidden');
                    return;
                }
                authToken = data.token;
                localStorage.setItem('adminAuthToken', authToken);
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('dashboardScreen').classList.remove('hidden');
                loadData();
            } catch (e) {
                err.textContent = 'Connection error. Is the server running?';
                err.classList.remove('hidden');
            }
        }

        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('passwordIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function logout() {
            authToken = '';
            localStorage.removeItem('adminAuthToken');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('dashboardScreen').classList.add('hidden');
            document.getElementById('passwordInput').value = '';
            document.getElementById('passwordInput').type = 'password';
            document.getElementById('passwordIcon').classList.remove('fa-eye-slash');
            document.getElementById('passwordIcon').classList.add('fa-eye');
        }

        let allSubmissions = [];
        let currentFilter = 'all';

        async function loadData() {
            try {
                const res = await fetch(API + '/api/admin/stats', {
                    headers: { 'Authorization': 'Bearer ' + authToken },
                });
                const stats = await res.json();
                document.getElementById('statsText').textContent =
                    'Total submissions: ' + (stats.totalSubmissions || 0) + ' | Last updated: ' + new Date().toLocaleString();
            } catch (e) {}

            try {
                const res = await fetch(API + '/api/admin/submissions', {
                    headers: { 'Authorization': 'Bearer ' + authToken },
                });
                const csvText = await res.text();
                const rows = csvText.trim().split('\n');
                const tbody = document.getElementById('tableBody');
                if (rows.length <= 1) {
                    tbody.innerHTML = '<tr><td colspan="10" class="text-center py-8 text-gray-400">No submissions yet.</td></tr>';
                    allSubmissions = [];
                    updateBranchFilter([]);
                    return;
                }

                // Parse all submissions
                allSubmissions = [];
                const branches = new Set();
                for (let i = 1; i < rows.length; i++) {
                    const cols = parseCsvRow(rows[i]);
                    if (cols.length < 10) continue;
                    branches.add(cols[8]);
                    allSubmissions.push({
                        id: cols[0],
                        timestamp: cols[1],
                        name: cols[2],
                        contact: cols[3],
                        email: cols[4],
                        amount: cols[5],
                        purpose: cols[7],
                        branch: cols[8],
                        status: cols[9]
                    });
                }

                // Update branch filter dropdown
                updateBranchFilter(Array.from(branches).sort());

                // Apply current filter
                applyFilter();
            } catch (e) {
                console.error('Load error:', e);
            }
        }

        function updateBranchFilter(branches) {
            const select = document.getElementById('branchFilter');
            const currentValue = select.value;
            
            // Clear existing options except "All Branches"
            select.innerHTML = '<option value="all">All Branches</option>';
            
            // Add branch options
            branches.forEach(branch => {
                const option = document.createElement('option');
                option.value = branch;
                option.textContent = branch;
                select.appendChild(option);
            });

            // Restore previous selection if it still exists
            if (branches.includes(currentValue)) {
                select.value = currentValue;
            }
        }

        function filterByBranch() {
            currentFilter = document.getElementById('branchFilter').value;
            applyFilter();
        }

        function resetFilter() {
            document.getElementById('branchFilter').value = 'all';
            currentFilter = 'all';
            applyFilter();
        }

        function applyFilter() {
            const tbody = document.getElementById('tableBody');
            const filterStatus = document.getElementById('filterStatus');
            
            let filtered = allSubmissions;
            if (currentFilter !== 'all') {
                filtered = allSubmissions.filter(sub => sub.branch === currentFilter);
                filterStatus.textContent = `Showing ${filtered.length} of ${allSubmissions.length} submissions`;
            } else {
                filterStatus.textContent = `Showing all ${allSubmissions.length} submissions`;
            }

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" class="text-center py-8 text-gray-400">No submissions found for this filter.</td></tr>';
                return;
            }

            let html = '';
            for (let i = filtered.length - 1; i >= 0; i--) {
                const sub = filtered[i];
                const statusClass = sub.status === 'PENDING' ? 'bg-yellow-100 text-yellow-800' :
                                    sub.status === 'APPROVED' ? 'bg-green-100 text-green-800' :
                                    'bg-gray-100 text-gray-800';
                html += '<tr class="border-b border-gray-50 hover:bg-gray-50">';
                html += '<td class="py-3 pr-4 font-mono text-xs">' + esc(sub.id) + '</td>';
                html += '<td class="py-3 pr-4 text-xs">' + esc(new Date(sub.timestamp).toLocaleString()) + '</td>';
                html += '<td class="py-3 pr-4 font-medium">' + esc(sub.name) + '</td>';
                html += '<td class="py-3 pr-4">' + esc(sub.contact) + '</td>';
                html += '<td class="py-3 pr-4 text-xs">' + esc(sub.email) + '</td>';
                html += '<td class="py-3 pr-4 font-medium">₱' + esc(sub.amount) + '</td>';
                html += '<td class="py-3 pr-4 capitalize">' + esc(sub.purpose) + '</td>';
                html += '<td class="py-3 pr-4 text-xs">' + esc(sub.branch) + '</td>';
                html += '<td class="py-3 pr-4"><span class="px-2 py-1 rounded-full text-xs font-semibold ' + statusClass + '">' + esc(sub.status) + '</span></td>';
                html += '<td class="py-3 pr-4">';
                if (sub.status === 'PENDING') {
                    html += '<button onclick="updateStatus(\'' + sub.id + '\', \'APPROVED\')" class="px-3 py-1 bg-green-500 text-white rounded-lg text-xs font-semibold hover:bg-green-600 transition">Mark Done</button>';
                } else {
                    html += '<span class="text-gray-400 text-xs">—</span>';
                }
                html += '</td>';
                html += '</tr>';
            }
            tbody.innerHTML = html;
        }

        async function updateStatus(id, newStatus) {
            if (!confirm(`Change status to ${newStatus}?`)) return;

            try {
                const res = await fetch(API + '/api/admin/update-status', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + authToken,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ id, status: newStatus }),
                });
                const data = await res.json();
                if (data.success) {
                    loadData(); // Refresh the table
                } else {
                    alert('Failed to update status: ' + (data.error || 'Unknown error'));
                }
            } catch (e) {
                alert('Error updating status. Please try again.');
            }
        }

        function parseCsvRow(row) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < row.length; i++) {
                const ch = row[i];
                if (ch === '"') { inQuotes = !inQuotes; continue; }
                if (ch === ',' && !inQuotes) { result.push(current.trim()); current = ''; continue; }
                current += ch;
            }
            result.push(current.trim());
            return result;
        }

        function esc(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        async function downloadCsv() {
            const res = await fetch(API + '/api/admin/submissions', {
                headers: { 'Authorization': 'Bearer ' + authToken },
            });
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'loan-applications.csv';
            a.click();
            URL.revokeObjectURL(url);
        }

        function logout() {
            authToken = '';
            localStorage.removeItem('adminAuthToken');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('dashboardScreen').classList.add('hidden');
            document.getElementById('passwordInput').value = '';
            document.getElementById('passwordInput').type = 'password';
            document.getElementById('passwordIcon').classList.remove('fa-eye-slash');
            document.getElementById('passwordIcon').classList.add('fa-eye');
        }

        // Enter key to login
        document.getElementById('passwordInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
