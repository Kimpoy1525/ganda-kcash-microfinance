<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>KCash Staff Portal</title><style>
:root{--green:#135c3b;--deep:#0b3929;--lime:#daf05e;--cream:#f4f5ed;--white:#fff;--line:#dde4dd;--ink:#15231d;--muted:#69776f;--red:#b42318}*{box-sizing:border-box}body{margin:0;background:var(--cream);color:var(--ink);font-family:Inter,system-ui,sans-serif}button,input,select{font:inherit}.login{min-height:100vh;display:grid;place-items:center;padding:20px;background:var(--deep)}.login-card{width:min(430px,100%);background:white;border-radius:26px;padding:38px}.brand{color:var(--green);font-weight:900;font-size:1.4rem}.muted{color:var(--muted)}label{display:block;font-size:.82rem;font-weight:800;margin:24px 0 7px}input,select{width:100%;border:1px solid var(--line);padding:13px;border-radius:11px;outline:0}input:focus,select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(19,92,59,.12)}button{border:0;border-radius:11px;padding:12px 18px;font-weight:800;cursor:pointer}.primary{background:var(--green);color:white}.login button{width:100%;margin-top:14px}.error{color:var(--red);font-size:.85rem;min-height:22px;margin-top:8px}.hidden{display:none!important}.shell{min-height:100vh}.top{background:var(--deep);color:white;padding:26px 0}.wrap{width:min(1220px,calc(100% - 36px));margin:auto}.top-in{display:flex;justify-content:space-between;align-items:center;gap:20px}.actions{display:flex;gap:10px}.actions button{background:rgba(255,255,255,.1);color:white;border:1px solid rgba(255,255,255,.18)}main{padding:34px 0}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-bottom:22px}.stat,.panel{background:white;border:1px solid var(--line);border-radius:20px;padding:22px}.stat small{color:var(--muted);font-weight:700}.stat strong{display:block;font-size:2rem;margin-top:5px}.toolbar{display:grid;grid-template-columns:1fr 220px auto;gap:12px;align-items:center;margin-bottom:18px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:15px}table{width:100%;border-collapse:collapse;min-width:1000px}th,td{padding:13px 14px;border-bottom:1px solid #edf0ed;text-align:left;font-size:.82rem}th{background:#f7f9f6;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-size:.7rem}.badge{display:inline-block;padding:5px 9px;border-radius:99px;background:#fff4cf;color:#755700;font-weight:800}.badge.APPROVED{background:#e4f5e9;color:#17623a}.badge.DECLINED{background:#fde9e7;color:#9d231a}.empty{text-align:center!important;color:var(--muted);padding:50px!important}@media(max-width:700px){.stats{grid-template-columns:1fr}.toolbar{grid-template-columns:1fr}.top-in{align-items:flex-start;flex-direction:column}.actions{width:100%;flex-wrap:wrap}}
</style></head><body>
<section id="login" class="login"><form id="loginForm" class="login-card"><div class="brand">G&A KCash</div><h1>Staff portal</h1><p class="muted">Authorized personnel only. Sessions automatically expire after eight hours.</p><label for="password">Admin password</label><input id="password" type="password" autocomplete="current-password" required autofocus><div id="loginError" class="error" role="alert"></div><button class="primary">Sign in securely</button><p><a href="/">← Return to website</a></p></form></section>
<section id="dashboard" class="shell hidden"><header class="top"><div class="wrap top-in"><div><div class="brand" style="color:var(--lime)">G&A KCash</div><span>Application workspace</span></div><div class="actions"><button id="refresh">Refresh</button><button id="download">Export CSV</button><button id="logout">Sign out</button></div></div></header><main class="wrap"><div class="stats"><div class="stat"><small>Total applications</small><strong id="total">—</strong></div><div class="stat"><small>Pending review</small><strong id="pending">—</strong></div><div class="stat"><small>Last refreshed</small><strong id="updated" style="font-size:1rem">—</strong></div></div><section class="panel"><div class="toolbar"><div><h2 style="margin:0">Applications</h2><small class="muted" id="count"></small></div><select id="branch"><option value="">All branches</option></select><select id="status"><option value="">All statuses</option><option>PENDING</option><option>APPROVED</option><option>DECLINED</option></select></div><div id="message" class="error"></div><div class="table-wrap"><table><thead><tr><th>Reference</th><th>Date</th><th>Applicant</th><th>Contact</th><th>Amount</th><th>Purpose</th><th>Branch</th><th>Status</th></tr></thead><tbody id="rows"><tr><td colspan="8" class="empty">Loading…</td></tr></tbody></table></div></section></main></section>
<script>
const $=id=>document.getElementById(id),login=$('login'),dashboard=$('dashboard');let records=[];
async function api(url,options={}){const r=await fetch(url,{...options,headers:{'Content-Type':'application/json',...(options.headers||{})},cache:'no-store'});if(r.status===401){showLogin();throw new Error('Your session expired. Please sign in again.')}if(!r.ok){let x={};try{x=await r.json()}catch{}throw new Error(x.error||'Request failed.')}return r}
function showLogin(){login.classList.remove('hidden');dashboard.classList.add('hidden')}
function showDash(){login.classList.add('hidden');dashboard.classList.remove('hidden')}
$('loginForm').onsubmit=async e=>{e.preventDefault();$('loginError').textContent='';try{await api('/api/admin/login',{method:'POST',body:JSON.stringify({password:$('password').value})});$('password').value='';showDash();await load()}catch(err){$('loginError').textContent=err.message}};
function parseCsv(text){const out=[];let row=[],field='',q=false;for(let i=0;i<text.length;i++){const c=text[i];if(c==='"'&&q&&text[i+1]==='"'){field+='"';i++}else if(c==='"')q=!q;else if(c===','&&!q){row.push(field);field=''}else if((c==='\n'||c==='\r')&&!q){if(c==='\r'&&text[i+1]==='\n')i++;row.push(field);if(row.some(Boolean))out.push(row);row=[];field=''}else field+=c}return out}
async function load(){try{const [csv,stats]=await Promise.all([api('/api/admin/submissions').then(r=>r.text()),api('/api/admin/stats').then(r=>r.json())]);records=parseCsv(csv).slice(1);$('total').textContent=stats.totalSubmissions;$('pending').textContent=stats.pending;$('updated').textContent=new Date(stats.lastUpdated).toLocaleString();const values=[...new Set(records.map(r=>r[8]))].sort();$('branch').innerHTML='<option value="">All branches</option>'+values.map(v=>`<option>${esc(v)}</option>`).join('');render()}catch(err){$('message').textContent=err.message}}
function esc(v=''){return v.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function render(){const branch=$('branch').value,status=$('status').value,list=records.filter(r=>(!branch||r[8]===branch)&&(!status||r[9]===status));$('count').textContent=`Showing ${list.length} of ${records.length}`;$('rows').innerHTML=list.length?list.slice().reverse().map(r=>`<tr><td><b>${esc(r[0])}</b></td><td>${new Date(r[1]).toLocaleDateString()}</td><td>${esc(r[2])}<br><small class="muted">${esc(r[4])}</small></td><td>${esc(r[3])}</td><td>₱${Number(r[5]).toLocaleString('en-PH',{minimumFractionDigits:2})}</td><td>${esc(r[7])}</td><td>${esc(r[8])}</td><td><select aria-label="Status for ${esc(r[0])}" onchange="setStatus('${esc(r[0])}',this.value,this)"><option ${r[9]==='PENDING'?'selected':''}>PENDING</option><option ${r[9]==='APPROVED'?'selected':''}>APPROVED</option><option ${r[9]==='DECLINED'?'selected':''}>DECLINED</option></select></td></tr>`).join(''):'<tr><td colspan="8" class="empty">No matching applications.</td></tr>'}
async function setStatus(id,status,el){el.disabled=true;try{await api('/api/admin/update-status',{method:'POST',body:JSON.stringify({id,status})});const r=records.find(x=>x[0]===id);if(r)r[9]=status;render();const s=await api('/api/admin/stats').then(r=>r.json());$('pending').textContent=s.pending}catch(err){alert(err.message);await load()}finally{el.disabled=false}}
$('branch').onchange=render;$('status').onchange=render;$('refresh').onclick=load;$('download').onclick=()=>{location.href='/api/admin/submissions'};$('logout').onclick=async()=>{try{await api('/api/admin/logout',{method:'POST',body:'{}'})}catch{}showLogin()};
api('/api/admin/stats').then(()=>{showDash();load()}).catch(()=>showLogin());
</script></body></html>
